<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- Background -->
  <rect width="256" height="256" fill="#3b82f6" rx="50"/>
  
  <!-- Microphone Icon -->
  <g transform="translate(128, 128)">
    <!-- Microphone body -->
    <rect x="-15" y="-30" width="30" height="50" rx="15" fill="#ffffff"/>
    
    <!-- Microphone stand -->
    <rect x="-3" y="20" width="6" height="40" fill="#ffffff"/>
    <circle cx="0" cy="70" r="8" fill="#ffffff"/>
    
    <!-- Sound waves -->
    <circle cx="45" cy="-20" r="8" fill="none" stroke="#ffffff" stroke-width="3"/>
    <circle cx="45" cy="-20" r="18" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.6"/>
    <circle cx="45" cy="-20" r="28" fill="none" stroke="#ffffff" stroke-width="2" opacity="0.3"/>
    
    <!-- Translation arrow -->
    <path d="M -60 0 L -40 0" stroke="#ffffff" stroke-width="3" fill="none"/>
    <polygon points="-40,0 -50,8 -45,0 -50,-8" fill="#ffffff"/>
    
    <!-- Text/Translation indicator -->
    <rect x="-70" y="-10" width="12" height="5" fill="#ffffff"/>
    <rect x="-70" y="0" width="12" height="5" fill="#ffffff"/>
    <rect x="-70" y="10" width="12" height="5" fill="#ffffff"/>
  </g>
  
  <!-- Subtle gradient overlay -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60a5fa;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:#1e40af;stop-opacity:0.2" />
    </linearGradient>
  </defs>
  <rect width="256" height="256" fill="url(#grad)" rx="50"/>
</svg>
